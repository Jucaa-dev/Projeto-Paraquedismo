<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

    <link rel="shortcut icon" href="/src/Logo-Footer.ico" type="image/x-icon">

    <link rel="stylesheet" href="style.css">
</head>

<body class="ceu">
    <main class="container-fluid d-flex justify-content-center" style="font-family: inter;">
        <div class="fundo-cadastro mt-5 rounded-4">
            <div class="d-flex align-items-center mt-4 flex-column gap-3">
                <img class="login-logo" src="./src/Logo Footer.png" alt="">
                <span
                    class="d-flex justify-content-center align-items-center login fs-2 fw-bold text-white rounded-3">Cadastro</span>
            </div>

            <div class="container-fluid">
                <div class="mb-3 mt-5 d-flex flex-column gap-3 align-items-center">
                    <div class="d-flex gap-5 limite-cadastro mb-4" >
                        <input type="text" id="nome" class="form-control" placeholder="Nome">
                        <input type="text" id="email" class="form-control" placeholder="Email">
                    </div>
                    <div class="d-flex gap-5 limite-cadastro mb-4">
                        <input type="tel" id="cpf" maxlength="14" class="form-control" required placeholder="CPF">
                        <input type="tel" id="telefone" class="form-control" placeholder="Telefone">
                    </div>
                    <div class="d-flex gap-5 limite-cadastro">
                        <input type="password" id="senha" class="form-control" placeholder="Senha">
                        <input type="password" id="senha" class="form-control" placeholder="Confirme sua senha">
                    </div>
                </div>
            </div>
            <div class="d-flex flex-column align-items-center">
                <button class="btn login w-100 fw-bold text-white fs-3 mb-2 mt-4 divs dedinho">
                    Cadastrar
                </button>
                <a href="./index.html" class="text-muted small mb-3">Voltar para o site</a>
            </div>

        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
